<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ケアモコ 管理者ページ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #fff7e9;
      padding: 1rem;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: #ffffff;
      padding: 1.5rem;
      border-radius: 1rem;
      border: 2px solid #f0d9c7;
      box-shadow: 0 0 10px rgba(255,200,200,0.3);
    }

    h2, h3 {
      margin-top: 0;
    }

    input, textarea {
      width: 100%;
      padding: 0.6rem;
      margin-bottom: 1rem;
      border-radius: 0.5rem;
      border: 1px solid #ccc;
      font-size: 0.9rem;
    }

    button {
      padding: 0.7rem 1rem;
      background: #ffb3c1;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button:hover {
      background: #ff6f91;
      color: #fff;
    }

    .note {
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>

<body>

<div id="login" class="box">
  <h2>管理者ログイン</h2>
  <p>パスワードを入力してください。</p>
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="login()">ログイン</button>
  <p class="note">※パスワード：caremoko2026</p>
</div>

<div id="admin" class="box" style="display:none;">
  <h2>ケアモコ 管理者ページ</h2>
  <p class="note">
    ここで追加した内容は JSON ファイルとしてダウンロードされます。  
    GitHub の <code>data/faq.json</code> と <code>data/reviews.json</code> を差し替えることでサイトに反映されます。
  </p>

  <h3>FAQ（よくある質問）を追加</h3>
  <input id="faq-q" type="text" placeholder="質問">
  <textarea id="faq-a" placeholder="答え"></textarea>
  <input id="faq-keywords" type="text" placeholder="検索用キーワード（カンマ区切り）">
  <button onclick="addFAQ()">FAQを追加してJSONをダウンロード</button>

  <hr>

  <h3>お客様の声を追加</h3>
  <input id="review-name" type="text" placeholder="投稿者（例：介護スタッフ）">
  <textarea id="review-text" placeholder="コメント"></textarea>
  <button onclick="addReview()">お客様の声を追加してJSONをダウンロード</button>
</div>

<script>
  function login() {
    const pw = document.getElementById("password").value;
    if (pw === "caremoko2026") {
      document.getElementById("login").style.display = "none";
      document.getElementById("admin").style.display = "block";
    } else {
      alert("パスワードが違います");
    }
  }

  function addFAQ() {
    const q = document.getElementById("faq-q").value.trim();
    const a = document.getElementById("faq-a").value.trim();
    const kw = document.getElementById("faq-keywords").value.trim();

    if (!q || !a) {
      alert("質問と答えを入力してください");
      return;
    }

    fetch("data/faq.json")
      .then(res => res.json())
      .catch(() => [])
      .then(data => {
        const keywords = kw ? kw.split(",").map(s => s.trim()) : [];
        data.push({ q, a, keywords });
        downloadJSON("faq.json", data);
        alert("FAQを追加した JSON をダウンロードしました。GitHub にアップロードしてください。");
      });
  }

  function addReview() {
    const name = document.getElementById("review-name").value.trim();
    const text = document.getElementById("review-text").value.trim();

    if (!name || !text) {
      alert("投稿者とコメントを入力してください");
      return;
    }

    fetch("data/reviews.json")
      .then(res => res.json())
      .catch(() => [])
      .then(data => {
        data.push({ name, text });
        downloadJSON("reviews.json", data);
        alert("お客様の声を追加した JSON をダウンロードしました。GitHub にアップロードしてください。");
      });
  }

  function downloadJSON(filename, data) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
