<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ケアモコ ヘルプポータル</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg-main: #fff7e9;
      --accent: #ffb3c1;
      --accent-strong: #ff6f91;
      --text-main: #333;
      --text-sub: #666;
      --card-bg: #ffffff;
      --border-soft: #f0d9c7;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      line-height: 1.6;
      background:
        radial-gradient(circle at 20% 20%, #fffdf8 0%, transparent 60%),
        radial-gradient(circle at 80% 30%, #fffdf8 0%, transparent 60%),
        radial-gradient(circle at 50% 80%, #fffdf8 0%, transparent 60%);
    }

    header {
      max-width: 1080px;
      margin: auto;
      padding: 1rem 0;
      text-align: center;
    }

    .help-img {
      width: 180px;
      max-width: 60%;
      display: block;
      margin: 0 auto 1rem;
    }

    .nav-button {
      padding: 0.6rem 1rem;
      border-radius: 999px;
      background: var(--accent);
      text-decoration: none;
      color: #000;
      font-size: 0.9rem;
      display: inline-block;
      min-height: 44px;
      margin-bottom: 1rem;
    }

    #search-box {
      width: 100%;
      max-width: 600px;
      margin: 0.5rem auto 1rem;
      display: block;
      padding: 0.8rem;
      border-radius: 0.6rem;
      border: 1px solid var(--border-soft);
      font-size: 1rem;
    }

    section {
      max-width: 1080px;
      margin: auto;
      padding: 1rem;
    }

    .faq-item {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #fffdf8;
      border-radius: 1rem;
      border: 2px solid var(--border-soft);
      box-shadow: 0 0 10px rgba(255,200,200,0.3);
    }

    footer {
      max-width: 1080px;
      margin: auto;
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--text-sub);
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <img src="img/kuma-help.png" alt="ヘルプ案内クマ" class="help-img">
  <h1>ヘルプポータル（よくある質問）</h1>

  <a href="./index.html" class="nav-button">トップページへ戻る</a>

  <input id="search-box" type="text" placeholder="質問を検索…" oninput="searchFAQ()">
</header>

<section id="faq-section">
  <p>FAQを読み込み中…</p>
</section>

<footer>
  <p>© ケアモコ CareMoko</p>
</footer>

<script>
  let faqList = [];

  function renderFAQ(list) {
    const section = document.getElementById("faq-section");
    section.innerHTML = "";
    if (!list.length) {
      section.innerHTML = "<p>まだFAQが登録されていません。管理者ページから追加できます。</p>";
      return;
    }
    list.forEach(item => {
      const div = document.createElement("div");
      div.className = "faq-item";
      div.innerHTML = `<h3>Q. ${item.q}</h3><p>${item.a}</p>`;
      section.appendChild(div);
    });
  }

  function searchFAQ() {
    const keyword = document.getElementById("search-box").value.toLowerCase();
    if (!keyword) {
      renderFAQ(faqList);
      return;
    }
    const results = faqList.filter(item =>
      item.q.toLowerCase().includes(keyword) ||
      (item.keywords || []).some(k => k.toLowerCase().includes(keyword))
    );
    renderFAQ(results);
  }

  // FAQを JSON から読み込み
  fetch("data/faq.json")
    .then(res => res.json())
    .then(data => {
      faqList = data;
      renderFAQ(faqList);
    })
    .catch(() => {
      document.getElementById("faq-section").innerHTML =
        "<p>FAQの読み込みに失敗しました。</p>";
    });
</script>

</body>
</html>
