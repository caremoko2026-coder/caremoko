<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ケアモコ ヘルプポータル</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg-main: #fff7e9;
      --accent: #ffb3c1;
      --accent-strong: #ff6f91;
      --text-main: #333;
      --text-sub: #666;
      --card-bg: #ffffff;
      --border-soft: #f0d9c7;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      line-height: 1.6;

      background:
        radial-gradient(circle at 20% 20%, #fffdf8 0%, transparent 60%),
        radial-gradient(circle at 80% 30%, #fffdf8 0%, transparent 60%),
        radial-gradient(circle at 50% 80%, #fffdf8 0%, transparent 60%);
    }

    header {
      max-width: 1080px;
      margin: auto;
      padding: 1rem 0;
      text-align: center;
    }

    .help-img {
      width: 180px;
      display: block;
      margin: 0 auto 1rem;
    }

    #search-box {
      width: 100%;
      max-width: 600px;
      margin: auto;
      display: block;
      padding: 0.8rem;
      border-radius: 0.6rem;
      border: 1px solid var(--border-soft);
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    .faq-item {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #fffdf8;
      border-radius: 1rem;
      border: 2px solid var(--border-soft);
      box-shadow: 0 0 10px rgba(255,200,200,0.3);
    }
  </style>
</head>

<body>

<header>
  <img src="img/kuma-help.png" alt="ヘルプ案内クマ" class="help-img">
  <h1>ヘルプポータル（よくある質問）</h1>

  <a href="./index.html" class="nav-button">トップページへ戻る</a>

  <input id="search-box" type="text" placeholder="質問を検索…" oninput="searchFAQ()">
</header>

<section id="faq-section"></section>

<footer>
  <p>© ケアモコ CareMoko</p>
</footer>

<script>
  const faqList = [
    {
      q: "クッションは洗えますか？",
      a: "はい、丸ごと洗えます。すぐ乾きます。",
      keywords: ["洗える", "洗濯", "乾く", "あらう", "せんたく", "洗う"]
    }
  ];

  function renderFAQ(list) {
    const section = document.getElementById("faq-section");
    section.innerHTML = "";

    list.forEach(item => {
      const div = document.createElement("div");
      div.className = "faq-item";
      div.innerHTML = `<h3>Q. ${item.q}</h3><p>${item.a}</p>`;
      section.appendChild(div);
    });
  }

  renderFAQ(faqList);

  function searchFAQ() {
    const keyword = document.getElementById("search-box").value.toLowerCase();

    const results = faqList.filter(item =>
      item.keywords.some(k => k.includes(keyword)) ||
      item.q.toLowerCase().includes(keyword)
    );

    renderFAQ(results.length ? results : [{
      q: "該当する質問がありません",
      a: "別のキーワードで検索してください。",
      keywords: []
    }]);
  }
</script>

</body>
</html>
